<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f5f7fa;
color:#111;
}

.app{
max-width:480px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:20px;
background:#14b8a6;
color:white;
text-align:center;
font-size:20px;
font-weight:600;
}

.screen{
flex:1;
display:none;
padding:20px;
overflow-y:auto;
}

.active{
display:block;
}

.balance-box{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
margin-bottom:20px;
text-align:center;
}

.balance-box h2{
margin:5px 0;
font-size:28px;
color:#14b8a6;
}

.card{
background:white;
padding:15px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.04);
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
}

button.primary{
width:100%;
padding:14px;
margin-top:15px;
border-radius:15px;
border:none;
background:#14b8a6;
color:white;
font-weight:600;
font-size:16px;
}

.transaction{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:10px;
font-size:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.03);
}

.month-title{
font-weight:600;
margin:15px 0 5px;
color:#14b8a6;
}

.bottom-nav{
display:flex;
justify-content:space-around;
background:white;
padding:10px 0;
box-shadow:0 -4px 15px rgba(0,0,0,0.05);
}

.bottom-nav div{
flex:1;
text-align:center;
font-size:14px;
cursor:pointer;
}

.fab{
position:fixed;
bottom:70px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#14b8a6;
color:white;
font-size:32px;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
cursor:pointer;
}

canvas{
margin-top:10px;
}
</style>
</head>

<body>

<div class="app">

<header>Finance Tracker</header>

<div id="dashboard" class="screen active">

<div class="balance-box">
<div>Balance</div>
<h2 id="balance">0</h2>
</div>

<div class="card">
Income: <span id="income"></span><br>
Expense: <span id="expense"></span><br>
Net Worth: <span id="networth"></span>
</div>

<div class="card">
<canvas id="expenseChart"></canvas>
</div>

</div>

<div id="add" class="screen">
<div class="card">
<input type="datetime-local" id="date">
<select id="type">
<option>Income</option>
<option>Expense</option>
<option>Asset</option>
<option>Liability</option>
</select>
<input type="text" id="category" placeholder="Category">
<input type="number" id="amount" placeholder="Amount">
<button class="primary" onclick="addTransaction()">Save</button>
</div>
</div>

<div id="history" class="screen">
<div id="transactions"></div>
</div>

<div class="bottom-nav">
<div onclick="showScreen('dashboard')">Dashboard</div>
<div onclick="showScreen('history')">History</div>
</div>

<div class="fab" onclick="showScreen('add')">+</div>

</div>

<script>

let transactions=JSON.parse(localStorage.getItem("data"))||[];
let chart;

function save(){
localStorage.setItem("data",JSON.stringify(transactions));
}

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function setCurrentDateTime(){
const now=new Date();
const offset=now.getTimezoneOffset();
const local=new Date(now.getTime()-offset*60000);
document.getElementById("date").value=local.toISOString().slice(0,16);
}

function resetForm(){
document.getElementById("category").value="";
document.getElementById("amount").value="";
setCurrentDateTime();
}

function addTransaction(){
const date=document.getElementById("date").value;
const type=document.getElementById("type").value;
const category=document.getElementById("category").value;
const amount=parseFloat(document.getElementById("amount").value);

if(!date||!category||!amount)return alert("Fill all fields");

transactions.push({id:Date.now(),date,type,category,amount});
save();
update();
resetForm();
showScreen("dashboard");
}

function update(){

let income=0,expense=0,asset=0,liability=0;
let expenseData={};

transactions.sort((a,b)=>new Date(b.date)-new Date(a.date));

transactions.forEach(t=>{
if(t.type==="Income")income+=t.amount;
if(t.type==="Expense"){
expense+=t.amount;
expenseData[t.category]=(expenseData[t.category]||0)+t.amount;
}
if(t.type==="Asset")asset+=t.amount;
if(t.type==="Liability")liability+=t.amount;
});

document.getElementById("income").innerText=income;
document.getElementById("expense").innerText=expense;
document.getElementById("balance").innerText=income-expense;
document.getElementById("networth").innerText=asset-liability;

renderTransactions();
renderChart(expenseData);
}

function renderTransactions(){
const container=document.getElementById("transactions");
container.innerHTML="";
let grouped={};

transactions.forEach(t=>{
let month=t.date.substring(0,7);
if(!grouped[month])grouped[month]=[];
grouped[month].push(t);
});

Object.keys(grouped).sort().reverse().forEach(month=>{
container.innerHTML+=`<div class="month-title">${month}</div>`;
grouped[month].forEach(t=>{
container.innerHTML+=`
<div class="transaction">
${new Date(t.date).toLocaleString()} | ${t.type} | ${t.category} | ${t.amount}
</div>`;
});
});
}

function renderChart(data){
const ctx=document.getElementById("expenseChart");
if(chart)chart.destroy();
chart=new Chart(ctx,{type:"pie",data:{labels:Object.keys(data),datasets:[{data:Object.values(data)}]}});
}

setCurrentDateTime();
update();

</script>

</body>
</html>
