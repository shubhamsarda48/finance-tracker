<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger Mobile</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#f8f8f8;
color:#111;
}

.app{
max-width:480px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:25px 20px 10px;
}

.brand{
font-family:'Playfair Display',serif;
font-size:26px;
}

.subtitle{
font-size:12px;
letter-spacing:2px;
color:#777;
margin-top:4px;
}

.screen{
flex:1;
display:none;
padding:20px;
overflow-y:auto;
}

.active{
display:block;
}

.section-title{
font-family:'Playfair Display',serif;
font-size:22px;
margin-bottom:5px;
}

.section-sub{
font-size:12px;
letter-spacing:1px;
color:#777;
margin-bottom:20px;
}

.balance-box{
background:white;
padding:25px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:20px;
}

.balance-box h2{
font-size:40px;
margin:10px 0;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
border:1px solid #ddd;
}

.card h4{
font-size:12px;
letter-spacing:1px;
color:#666;
margin:0;
}

.card div{
font-size:18px;
margin-top:5px;
}

.transaction{
background:white;
padding:15px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:10px;
}

.transaction-title{
font-weight:600;
}

.transaction-meta{
font-size:12px;
color:#666;
margin-top:4px;
}

.bottom-nav{
display:flex;
justify-content:space-around;
border-top:1px solid #ddd;
background:white;
padding:10px 0;
font-size:13px;
}

.bottom-nav div{
flex:1;
text-align:center;
cursor:pointer;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:black;
color:white;
border:none;
border-radius:6px;
}

canvas{
margin-top:20px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="brand">Ledger</div>
<div class="subtitle">BUDGET TRACKER</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen active">

<div class="section-title">Dashboard</div>
<div class="section-sub">FINANCIAL OVERVIEW</div>

<div class="balance-box">
<div>Available Balance</div>
<h2 id="balance">₹0</h2>
</div>

<div class="grid">
<div class="card">
<h4>TOTAL INCOME</h4>
<div id="income">0</div>
</div>
<div class="card">
<h4>TOTAL EXPENSE</h4>
<div id="expense">0</div>
</div>
<div class="card">
<h4>ASSETS</h4>
<div id="asset">0</div>
</div>
<div class="card">
<h4>LIABILITIES</h4>
<div id="liability">0</div>
</div>
</div>

</div>

<!-- TRANSACTIONS -->
<div id="transactions" class="screen">

<div class="section-title">Transactions</div>
<div class="section-sub">ALL YOUR ENTRIES</div>

<div id="transactionList"></div>

<button onclick="showScreen('add')">+ Add Transaction</button>

</div>

<!-- ADD -->
<div id="add" class="screen">

<div class="section-title">Add Transaction</div>
<div class="section-sub">NEW ENTRY</div>

<input type="datetime-local" id="date">
<select id="type">
<option>Income</option>
<option>Expense</option>
<option>Asset</option>
<option>Liability</option>
</select>
<input type="text" id="category" placeholder="Category">
<input type="number" id="amount" placeholder="Amount">

<button onclick="addTransaction()">Save</button>

</div>

<!-- ANALYTICS -->
<div id="analytics" class="screen">

<div class="section-title">Analytics</div>
<div class="section-sub">INSIGHTS & TRENDS</div>

<canvas id="expenseChart"></canvas>

</div>

<div class="bottom-nav">
<div onclick="showScreen('dashboard')">Dashboard</div>
<div onclick="showScreen('transactions')">Transactions</div>
<div onclick="showScreen('analytics')">Analytics</div>
</div>

</div>

<script>

let transactions=JSON.parse(localStorage.getItem("data"))||[];
let chart;

function save(){
localStorage.setItem("data",JSON.stringify(transactions));
}

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function setCurrentDateTime(){
const now=new Date();
const offset=now.getTimezoneOffset();
const local=new Date(now.getTime()-offset*60000);
document.getElementById("date").value=local.toISOString().slice(0,16);
}

function addTransaction(){
const date=document.getElementById("date").value;
const type=document.getElementById("type").value;
const category=document.getElementById("category").value;
const amount=parseFloat(document.getElementById("amount").value);

if(!date||!category||!amount)return alert("Fill all fields");

transactions.push({id:Date.now(),date,type,category,amount});
save();
update();
showScreen("dashboard");
setCurrentDateTime();
document.getElementById("category").value="";
document.getElementById("amount").value="";
}

function update(){

let income=0,expense=0,asset=0,liability=0;
let expenseData={};

transactions.sort((a,b)=>new Date(b.date)-new Date(a.date));

transactions.forEach(t=>{
if(t.type==="Income")income+=t.amount;
if(t.type==="Expense"){
expense+=t.amount;
expenseData[t.category]=(expenseData[t.category]||0)+t.amount;
}
if(t.type==="Asset")asset+=t.amount;
if(t.type==="Liability")liability+=t.amount;
});

document.getElementById("income").innerText=income;
document.getElementById("expense").innerText=expense;
document.getElementById("asset").innerText=asset;
document.getElementById("liability").innerText=liability;
document.getElementById("balance").innerText="₹"+(income-expense);

renderTransactions();
renderChart(expenseData);
}

function renderTransactions(){
const container=document.getElementById("transactionList");
container.innerHTML="";
transactions.forEach(t=>{
container.innerHTML+=`
<div class="transaction">
<div class="transaction-title">${t.category}</div>
<div class="transaction-meta">
${new Date(t.date).toLocaleString()} • ${t.type} • ₹${t.amount}
</div>
</div>`;
});
}

function renderChart(data){
const ctx=document.getElementById("expenseChart");
if(chart)chart.destroy();
chart=new Chart(ctx,{
type:"pie",
data:{labels:Object.keys(data),datasets:[{data:Object.values(data)}]}
});
}

setCurrentDateTime();
update();

</script>

</body>
</html>
