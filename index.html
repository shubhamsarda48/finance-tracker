<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#f8f8f8;
color:#111;
overflow-x:hidden;
}

.app{
max-width:480px;
margin:auto;
min-height:100vh;
position:relative;
}

.header{
padding:25px 20px 10px;
}

.brand{
font-family:'Playfair Display',serif;
font-size:26px;
}

.screen{
position:absolute;
width:100%;
top:80px;
left:0;
padding:20px;
transition:0.3s ease;
min-height:100vh;
background:#f8f8f8;
}

.hidden{
transform:translateX(100%);
}

.active{
transform:translateX(0);
}

.card{
background:white;
padding:15px;
border:1px solid #ddd;
margin-bottom:10px;
cursor:pointer;
}

.balance-box{
background:white;
padding:20px;
border:1px solid #ddd;
margin-bottom:15px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
background:black;
color:white;
}

.small-btn{
background:#eee;
color:#111;
font-size:12px;
padding:6px;
margin-top:6px;
}

.filter-btn{
background:#eee;
color:#111;
margin-right:5px;
margin-top:5px;
padding:5px;
display:inline-block;
font-size:12px;
cursor:pointer;
}

.back-btn{
background:#eee;
color:#111;
padding:6px;
margin-bottom:10px;
display:inline-block;
cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="brand">Ledger</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen active">

<div class="balance-box">
Balance: ₹<span id="balance">0</span><br>
Income: ₹<span id="income">0</span><br>
Expense: ₹<span id="expense">0</span><br>
Assets: ₹<span id="asset">0</span><br>
Liabilities: ₹<span id="liability">0</span>
</div>

<div class="card" onclick="openType('Income')">Income</div>
<div class="card" onclick="openType('Expense')">Expense</div>
<div class="card" onclick="openType('Asset')">Assets</div>
<div class="card" onclick="openType('Liability')">Liabilities</div>

</div>

<!-- CATEGORY SCREEN -->
<div id="categoryScreen" class="screen hidden">
<div class="back-btn" onclick="goBack()">← Back</div>
<div id="categoryTitle"></div>
<div id="categoryList"></div>
</div>

<!-- TRANSACTION SCREEN -->
<div id="transactionScreen" class="screen hidden">
<div class="back-btn" onclick="goBack()">← Back</div>
<div id="transactionTitle"></div>

<div>
<div class="filter-btn" onclick="applyQuickFilter('thisMonth')">This Month</div>
<div class="filter-btn" onclick="applyQuickFilter('lastMonth')">Last Month</div>
<div class="filter-btn" onclick="applyQuickFilter('thisYear')">This Year</div>
</div>

<div style="margin-top:10px;">
From: <input type="date" id="fromDate">
To: <input type="date" id="toDate">
<button onclick="applyCustomFilter()">Apply</button>
</div>

<div id="transactionList"></div>
</div>

</div>

<script>

let ledgers = JSON.parse(localStorage.getItem("ledgers")) || {
Income:["Salary"],
Expense:["Rent","Cook","Cleaner","Food","Travel","Electricity"],
Asset:["PwC"],
Liability:["HDFC Credit Card","One Card","Yes Bank Credit Card"]
};

let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

let navStack = [];
let currentType = null;
let currentLedger = null;

function saveAll(){
localStorage.setItem("transactions",JSON.stringify(transactions));
localStorage.setItem("ledgers",JSON.stringify(ledgers));
}

function navigate(screen){
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
document.getElementById(screen).classList.remove("hidden");
document.getElementById(screen).classList.add("active");
navStack.push(screen);
}

function goBack(){
navStack.pop();
const prev = navStack[navStack.length-1] || "dashboard";
document.querySelectorAll(".screen").forEach(s=>s.classList.add("hidden"));
document.getElementById(prev).classList.remove("hidden");
}

function updateDashboard(){
let income=0,expense=0,asset=0,liability=0;

transactions.forEach(t=>{
if(t.type==="Income")income+=t.amount;
if(t.type==="Expense")expense+=t.amount;
if(t.type==="Asset")asset+=t.amount;
if(t.type==="Liability")liability+=t.amount;
});

document.getElementById("income").innerText=income;
document.getElementById("expense").innerText=expense;
document.getElementById("asset").innerText=asset;
document.getElementById("liability").innerText=liability;
document.getElementById("balance").innerText=income-expense;
}

function openType(type){
currentType = type;
document.getElementById("categoryTitle").innerHTML="<h3>"+type+"</h3>";
let html="";
let list = ledgers[type] || [];

if(type==="Asset" || type==="Liability"){
let splitwiseBalance = getLedgerBalance("Splitwise","Asset") - getLedgerBalance("Splitwise","Liability");
if(type==="Asset" && splitwiseBalance>0){
html+=`<div class="card" onclick="openLedger('Splitwise')">Splitwise - ₹${splitwiseBalance}</div>`;
}
if(type==="Liability" && splitwiseBalance<0){
html+=`<div class="card" onclick="openLedger('Splitwise')">Splitwise - ₹${Math.abs(splitwiseBalance)}</div>`;
}
}

list.forEach(l=>{
let bal=getLedgerBalance(l,type);
html+=`<div class="card" onclick="openLedger('${l}')">${l} - ₹${bal}</div>`;
});

document.getElementById("categoryList").innerHTML=html;
navigate("categoryScreen");
}

function getLedgerBalance(name,type){
return transactions
.filter(t=>t.ledger===name && t.type===type)
.reduce((sum,t)=>sum+t.amount,0);
}

function openLedger(ledger){
currentLedger = ledger;
document.getElementById("transactionTitle").innerHTML="<h3>"+ledger+"</h3>";
renderTransactions(transactions.filter(t=>t.ledger===ledger));
navigate("transactionScreen");
}

function renderTransactions(list){
let html="";
list.sort((a,b)=>new Date(b.date)-new Date(a.date));
list.forEach(t=>{
html+=`
<div class="card">
₹${t.amount}<br>
${new Date(t.date).toLocaleString()}<br>
${t.description||""}
<button class="small-btn" onclick="deleteTransaction(${t.id})">Delete</button>
</div>`;
});
document.getElementById("transactionList").innerHTML=html;
}

function deleteTransaction(id){
transactions = transactions.filter(t=>t.id!==id && t.linkedId!==id);
saveAll();
updateDashboard();
openLedger(currentLedger);
}

function applyQuickFilter(type){
let now=new Date();
let filtered=[];
if(type==="thisMonth"){
filtered=transactions.filter(t=>{
let d=new Date(t.date);
return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear() && t.ledger===currentLedger;
});
}
if(type==="lastMonth"){
let lastMonth=new Date(now.getFullYear(),now.getMonth()-1);
filtered=transactions.filter(t=>{
let d=new Date(t.date);
return d.getMonth()===lastMonth.getMonth() && d.getFullYear()===lastMonth.getFullYear() && t.ledger===currentLedger;
});
}
if(type==="thisYear"){
filtered=transactions.filter(t=>{
let d=new Date(t.date);
return d.getFullYear()===now.getFullYear() && t.ledger===currentLedger;
});
}
renderTransactions(filtered);
}

function applyCustomFilter(){
let from=new Date(document.getElementById("fromDate").value);
let to=new Date(document.getElementById("toDate").value);
let filtered=transactions.filter(t=>{
let d=new Date(t.date);
return d>=from && d<=to && t.ledger===currentLedger;
});
renderTransactions(filtered);
}

updateDashboard();
navStack.push("dashboard");

</script>

</body>
</html>
