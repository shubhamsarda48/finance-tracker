<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#f8f8f8;
color:#111;
}

.app{
max-width:480px;
margin:auto;
min-height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:25px 20px 10px;
}

.brand{
font-family:'Playfair Display',serif;
font-size:26px;
}

.subtitle{
font-size:12px;
letter-spacing:2px;
color:#777;
margin-top:4px;
}

.section{
padding:20px;
}

.section-title{
font-family:'Playfair Display',serif;
font-size:22px;
margin-bottom:5px;
}

.balance-box{
background:white;
padding:25px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:20px;
}

.balance-box h2{
font-size:36px;
margin:10px 0;
}

.card{
background:white;
padding:15px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:10px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:14px;
margin-top:15px;
background:black;
color:white;
border:none;
border-radius:6px;
}

.transaction{
background:white;
padding:15px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:10px;
}

.transaction-meta{
font-size:12px;
color:#666;
margin-top:5px;
}

.small-btn{
background:#eee;
color:#111;
margin-top:8px;
padding:8px;
font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="brand">Ledger</div>
<div class="subtitle">PERSONAL ACCOUNTING</div>
</div>

<div class="section">

<div class="section-title">Dashboard</div>

<div class="balance-box">
<div>Available Balance</div>
<h2 id="balance">₹0</h2>
</div>

<div class="card">
Income: ₹<span id="income">0</span><br>
Expense: ₹<span id="expense">0</span><br>
Assets: ₹<span id="asset">0</span><br>
Liabilities: ₹<span id="liability">0</span>
</div>

</div>

<div class="section">

<div class="section-title">Add Transaction</div>

<input type="datetime-local" id="date">

<select id="type" onchange="handleTypeChange()">
<option value="">Select Type</option>
<option>Income</option>
<option>Expense</option>
<option>Asset</option>
<option>Liability</option>
<option>Splitwise</option>
</select>

<select id="category"></select>

<div id="splitwiseToggle" style="display:none;">
<select id="splitwiseType">
<option value="get">You Get</option>
<option value="owe">You Owe</option>
</select>
</div>

<div id="creditCardSection" style="display:none;">
<label>
<input type="checkbox" id="paidByCard" onchange="toggleCardSelect()">
 Paid via Credit Card
</label>
<select id="cardSelect" style="display:none;">
<option>HDFC Credit Card</option>
<option>One Card</option>
<option>Yes Bank Credit Card</option>
</select>
</div>

<input type="number" id="amount" placeholder="Amount (negative allowed)">
<textarea id="description" placeholder="Optional description"></textarea>

<button onclick="saveTransaction()">Save</button>

</div>

<div class="section">
<div class="section-title">Transactions</div>
<div id="transactionList"></div>
</div>

</div>

<script>

const defaultCategories={
Income:["Salary"],
Expense:["Rent","Cook","Cleaner","Food","Travel","Electricity"],
Asset:["PwC"],
Liability:["HDFC Credit Card","One Card","Yes Bank Credit Card"]
};

let transactions=JSON.parse(localStorage.getItem("ledgerData"))||[];
let editId=null;

function saveData(){
localStorage.setItem("ledgerData",JSON.stringify(transactions));
}

function handleTypeChange(){
const type=document.getElementById("type").value;
const categorySelect=document.getElementById("category");
categorySelect.innerHTML="";
document.getElementById("splitwiseToggle").style.display="none";
document.getElementById("creditCardSection").style.display="none";

if(type==="Splitwise"){
document.getElementById("splitwiseToggle").style.display="block";
categorySelect.innerHTML="<option>Splitwise</option>";
return;
}

if(defaultCategories[type]){
defaultCategories[type].forEach(c=>{
categorySelect.innerHTML+=`<option>${c}</option>`;
});
}

if(type==="Expense"){
document.getElementById("creditCardSection").style.display="block";
}
}

function toggleCardSelect(){
document.getElementById("cardSelect").style.display=
document.getElementById("paidByCard").checked?"block":"none";
}

function setNow(){
const now=new Date();
const offset=now.getTimezoneOffset();
const local=new Date(now.getTime()-offset*60000);
document.getElementById("date").value=local.toISOString().slice(0,16);
}

function saveTransaction(){
const date=document.getElementById("date").value;
const type=document.getElementById("type").value;
const category=document.getElementById("category").value;
const amount=parseFloat(document.getElementById("amount").value);
const description=document.getElementById("description").value;

if(!date||!type||!category||isNaN(amount))return alert("Fill required fields");

if(editId){
transactions=transactions.filter(t=>t.id!==editId && t.linkedId!==editId);
editId=null;
}

const id=Date.now();

if(type==="Splitwise"){
const swType=document.getElementById("splitwiseType").value;
const finalType=swType==="get"?"Asset":"Liability";
transactions.push({id,date,type:finalType,category:"Splitwise",amount,description});
}else{
transactions.push({id,date,type,category,amount,description});
}

if(type==="Expense" && document.getElementById("paidByCard").checked){
const card=document.getElementById("cardSelect").value;
transactions.push({
id:Date.now()+1,
date,
type:"Liability",
category:card,
amount:amount,
description:"Auto from expense",
linkedId:id
});
}

saveData();
resetForm();
update();
}

function resetForm(){
document.getElementById("amount").value="";
document.getElementById("description").value="";
document.getElementById("paidByCard").checked=false;
document.getElementById("cardSelect").style.display="none";
setNow();
}

function update(){

let income=0,expense=0,asset=0,liability=0;

transactions.forEach(t=>{
if(t.type==="Income")income+=t.amount;
if(t.type==="Expense")expense+=t.amount;
if(t.type==="Asset")asset+=t.amount;
if(t.type==="Liability")liability+=t.amount;
});

document.getElementById("income").innerText=income;
document.getElementById("expense").innerText=expense;
document.getElementById("asset").innerText=asset;
document.getElementById("liability").innerText=liability;
document.getElementById("balance").innerText="₹"+(income-expense);

renderTransactions();
}

function renderTransactions(){
const container=document.getElementById("transactionList");
container.innerHTML="";
transactions.sort((a,b)=>new Date(b.date)-new Date(a.date));

transactions.forEach(t=>{
container.innerHTML+=`
<div class="transaction">
<div><strong>${t.category}</strong> (${t.type}) - ₹${t.amount}</div>
<div class="transaction-meta">
${new Date(t.date).toLocaleString()}<br>
${t.description||""}
</div>
<button class="small-btn" onclick="editTransaction(${t.id})">Edit</button>
<button class="small-btn" onclick="deleteTransaction(${t.id})">Delete</button>
</div>`;
});
}

function editTransaction(id){
const t=transactions.find(t=>t.id===id);
editId=id;
document.getElementById("date").value=t.date;
document.getElementById("type").value=t.type==="Asset"&&t.category==="Splitwise"?"Splitwise":t.type;
handleTypeChange();
document.getElementById("amount").value=t.amount;
document.getElementById("description").value=t.description;
}

function deleteTransaction(id){
transactions=transactions.filter(t=>t.id!==id && t.linkedId!==id);
saveData();
update();
}

setNow();
update();

</script>

</body>
</html>
