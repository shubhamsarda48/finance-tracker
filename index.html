<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#f8f8f8;
color:#111;
}

.app{
max-width:480px;
margin:auto;
min-height:100vh;
}

.header{
padding:25px 20px 10px;
}

.brand{
font-family:'Playfair Display',serif;
font-size:26px;
}

.section{
padding:20px;
}

.section-title{
font-family:'Playfair Display',serif;
font-size:20px;
margin-bottom:10px;
}

.balance-box{
background:white;
padding:20px;
border:1px solid #ddd;
margin-bottom:15px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:black;
color:white;
border:none;
}

.small-btn{
background:#eee;
color:#111;
padding:6px;
margin-top:5px;
font-size:12px;
}

.transaction{
background:white;
border:1px solid #ddd;
padding:12px;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="brand">Ledger</div>
</div>

<div class="section">

<div class="section-title">Dashboard</div>

<div class="balance-box">
Balance: ₹<span id="balance">0</span><br>
Income: ₹<span id="income">0</span><br>
Expense: ₹<span id="expense">0</span><br>
Assets: ₹<span id="asset">0</span><br>
Liabilities: ₹<span id="liability">0</span>
</div>

</div>

<div class="section">

<div class="section-title">Add Transaction</div>

<input type="datetime-local" id="date">

<select id="type" onchange="handleTypeChange()">
<option value="">Select Type</option>
<option>Income</option>
<option>Expense</option>
<option>Asset</option>
<option>Liability</option>
<option>Splitwise</option>
</select>

<select id="ledgerSelect"></select>

<input type="text" id="newLedger" placeholder="Add New Ledger (optional)">
<button onclick="addLedger()">Add Ledger</button>

<div id="splitwiseSection" style="display:none;">
<select id="splitwiseMode">
<option value="get">You Get</option>
<option value="owe">You Owe</option>
</select>
</div>

<div id="creditCardSection" style="display:none;">
<label>
<input type="checkbox" id="paidByCard"> Paid via Credit Card
</label>
<select id="cardSelect">
<option>HDFC Credit Card</option>
<option>One Card</option>
<option>Yes Bank Credit Card</option>
</select>
</div>

<input type="number" id="amount" placeholder="Amount (negative allowed)">
<textarea id="description" placeholder="Description (optional)"></textarea>

<button onclick="saveTransaction()">Save</button>

</div>

<div class="section">

<div class="section-title">Transactions</div>
<div id="transactionList"></div>

</div>

</div>

<script>

let ledgers = JSON.parse(localStorage.getItem("ledgers")) || {
Income:["Salary"],
Expense:["Rent","Cook","Cleaner","Food","Travel","Electricity"],
Asset:["PwC"],
Liability:["HDFC Credit Card","One Card","Yes Bank Credit Card"]
};

let transactions = JSON.parse(localStorage.getItem("transactions")) || [];
let editId = null;

function saveAll(){
localStorage.setItem("transactions",JSON.stringify(transactions));
localStorage.setItem("ledgers",JSON.stringify(ledgers));
}

function setNow(){
const now=new Date();
const offset=now.getTimezoneOffset();
const local=new Date(now.getTime()-offset*60000);
document.getElementById("date").value=local.toISOString().slice(0,16);
}

function handleTypeChange(){
const type=document.getElementById("type").value;
const select=document.getElementById("ledgerSelect");
select.innerHTML="";
document.getElementById("splitwiseSection").style.display="none";
document.getElementById("creditCardSection").style.display="none";

if(type==="Splitwise"){
document.getElementById("splitwiseSection").style.display="block";
select.innerHTML="<option>Splitwise</option>";
return;
}

if(ledgers[type]){
ledgers[type].forEach(l=>{
select.innerHTML+=`<option>${l}</option>`;
});
}

if(type==="Expense"){
document.getElementById("creditCardSection").style.display="block";
}
}

function addLedger(){
const type=document.getElementById("type").value;
const name=document.getElementById("newLedger").value.trim();
if(!type||!name)return alert("Select type & enter name");
if(type==="Splitwise")return alert("Splitwise is system ledger");

if(!ledgers[type].includes(name)){
ledgers[type].push(name);
saveAll();
handleTypeChange();
document.getElementById("newLedger").value="";
}
}

function saveTransaction(){
const date=document.getElementById("date").value;
const type=document.getElementById("type").value;
let ledger=document.getElementById("ledgerSelect").value;
const amount=parseFloat(document.getElementById("amount").value);
const description=document.getElementById("description").value;

if(!date||!type||!ledger||isNaN(amount))return alert("Fill required");

if(editId){
transactions = transactions.filter(t => t.id !== editId && t.linkedId !== editId);
editId = null;
}

const id=Date.now();

if(type==="Splitwise"){
const mode=document.getElementById("splitwiseMode").value;
const finalType=mode==="get"?"Asset":"Liability";
transactions.push({id,date,type:finalType,ledger:"Splitwise",amount,description});
}else{
transactions.push({id,date,type,ledger,amount,description});
}

if(type==="Expense" && document.getElementById("paidByCard").checked){
const card=document.getElementById("cardSelect").value;
transactions.push({
id:Date.now()+1,
date,
type:"Liability",
ledger:card,
amount:amount,
description:"Auto from expense",
linkedId:id
});
}

saveAll();
update();
resetForm();
}

function resetForm(){
document.getElementById("amount").value="";
document.getElementById("description").value="";
document.getElementById("newLedger").value="";
document.getElementById("paidByCard").checked=false;
setNow();
}

function editTransaction(id){
const t = transactions.find(t=>t.id===id);
if(!t) return;

editId = id;

document.getElementById("date").value = t.date;
document.getElementById("type").value = t.type==="Asset"&&t.ledger==="Splitwise"||t.type==="Liability"&&t.ledger==="Splitwise"?"Splitwise":t.type;
handleTypeChange();
document.getElementById("ledgerSelect").value = t.ledger;
document.getElementById("amount").value = t.amount;
document.getElementById("description").value = t.description;
}

function deleteTransaction(id){
if(!confirm("Delete this transaction?")) return;

transactions = transactions.filter(t => t.id !== id && t.linkedId !== id);
saveAll();
update();
}

function update(){
let income=0,expense=0,asset=0,liability=0;

transactions.forEach(t=>{
if(t.type==="Income")income+=t.amount;
if(t.type==="Expense")expense+=t.amount;
if(t.type==="Asset")asset+=t.amount;
if(t.type==="Liability")liability+=t.amount;
});

document.getElementById("income").innerText=income;
document.getElementById("expense").innerText=expense;
document.getElementById("asset").innerText=asset;
document.getElementById("liability").innerText=liability;
document.getElementById("balance").innerText=income-expense;

renderTransactions();
}

function renderTransactions(){
const container=document.getElementById("transactionList");
container.innerHTML="";
transactions.sort((a,b)=>new Date(b.date)-new Date(a.date));

transactions.forEach(t=>{
container.innerHTML+=`
<div class="transaction">
<strong>${t.ledger}</strong> (${t.type}) - ₹${t.amount}<br>
${new Date(t.date).toLocaleString()}<br>
${t.description||""}
<br>
<button class="small-btn" onclick="editTransaction(${t.id})">Edit</button>
<button class="small-btn" onclick="deleteTransaction(${t.id})">Delete</button>
</div>`;
});
}

setNow();
update();

</script>
</body>
</html>
